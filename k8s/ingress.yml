apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: karpathy-wiki-ingress
  labels:
    app.kubernetes.io/name: karpathy-wiki-ingress
spec:
  rules:
  - host: karpathy-wiki.local
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: karpathy-wiki-service
            port:
              number: 80
